<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Caldy</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0a0a0f;
    --bg-card: #111118;
    --bg-card2: #16161f;
    --bg-glass: rgba(255,255,255,0.04);
    --bg-glass2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --text-sub: #8888a0;
    --text-dim: #44445a;
    --accent: #5b8fff;
    --green: #30d158;
    --red: #ff453a;
    --yellow: #ffd60a;

    --c-study: #4f8eff;
    --c-gym: #ff6b35;
    --c-work: #a855f7;
    --c-projects: #06d6a0;
    --c-health: #ff9f0a;
    --c-reading: #5ac8fa;
    --c-habit: #ff375f;

    --radius: 18px;
    --radius-sm: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-base);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── SCROLLBAR ─────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ─── AUTH SCREEN ───────────────────────────── */
  #auth-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg-base);
    z-index: 999;
    padding: 24px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #auth-screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

  .auth-logo {
    font-size: 52px; font-weight: 800;
    letter-spacing: -3px;
    background: linear-gradient(135deg, #5b8fff 0%, #a855f7 50%, #06d6a0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .auth-tagline {
    color: var(--text-sub); font-size: 15px; font-weight: 400;
    margin-bottom: 48px; letter-spacing: 0.2px;
  }
  .auth-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%; max-width: 380px;
    backdrop-filter: blur(20px);
  }
  .auth-tabs {
    display: flex; gap: 4px;
    background: var(--bg-glass);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1; padding: 10px;
    background: none; border: none;
    color: var(--text-sub); font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 500;
    border-radius: 9px; cursor: pointer;
    transition: all 0.2s ease;
  }
  .auth-tab.active {
    background: var(--bg-card2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .auth-field { margin-bottom: 14px; }
  .auth-field label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-sub); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 8px;
  }
  .auth-field input {
    width: 100%; padding: 14px 16px;
    background: var(--bg-glass2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .auth-field input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #5b8fff, #a855f7);
    border: none; border-radius: var(--radius-sm);
    color: white; font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 6px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .auth-btn:hover { opacity: 0.9; }
  .auth-btn:active { transform: scale(0.98); }
  .auth-error {
    color: var(--red); font-size: 13px;
    text-align: center; margin-top: 12px;
    min-height: 18px;
  }

  /* ─── APP LAYOUT ────────────────────────────── */
  #app { display: none; min-height: 100dvh; flex-direction: column; }
  #app.visible { display: flex; }

  /* ─── TOP BAR ───────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-logo {
    font-size: 26px; font-weight: 800; letter-spacing: -1.5px;
    background: linear-gradient(135deg, #5b8fff, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-glass2);
    border: 1px solid var(--border);
    border-radius: 40px; padding: 6px 12px 6px 6px;
    cursor: pointer; transition: background 0.2s;
  }
  .user-pill:hover { background: var(--bg-glass); }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #5b8fff, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white;
    overflow: hidden; flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user-name { font-size: 14px; font-weight: 500; }

  /* ─── NAV BAR ───────────────────────────────── */
  .navbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 10px 16px calc(var(--safe-bottom) + 10px);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.2s;
    background: none; border: none; color: var(--text-sub);
    font-family: 'Outfit', sans-serif;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }
  .nav-dot {
    position: absolute; top: 8px; right: 8px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }

  /* ─── MAIN CONTENT ──────────────────────────── */
  .main { flex: 1; overflow-y: auto; padding: 20px 16px 100px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ─── SECTION HEADER ────────────────────────── */
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .section-title { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }
  .section-sub { font-size: 14px; color: var(--text-sub); margin-top: 2px; }

  /* ─── TODAY STRIP ───────────────────────────── */
  .today-strip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .today-date { font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 4px; }
  .today-day { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
  .today-progress { display: flex; flex-direction: column; gap: 6px; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-label { font-size: 12px; color: var(--text-sub); width: 60px; }
  .progress-track {
    flex: 1; height: 6px;
    background: var(--bg-glass2);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .progress-pct { font-size: 12px; font-weight: 600; width: 32px; text-align: right; }

  /* ─── SECTION CARDS GRID ────────────────────── */
  .sections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .section-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .section-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--c);
    border-radius: 3px 3px 0 0;
  }
  .section-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .section-card:active { transform: scale(0.98); }
  .card-icon { font-size: 28px; margin-bottom: 10px; }
  .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-streak { font-size: 12px; color: var(--text-sub); }
  .card-streak span { color: var(--yellow); font-weight: 600; }
  .card-today {
    position: absolute; top: 16px; right: 16px;
    width: 10px; height: 10px; border-radius: 50%;
  }
  .card-today.done { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .card-today.skip { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .card-today.none { background: var(--text-dim); }

  /* ─── ADD SECTION BTN ───────────────────────── */
  .add-section-card {
    background: var(--bg-glass);
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; min-height: 110px;
    color: var(--text-sub);
  }
  .add-section-card:hover { background: var(--bg-glass2); border-color: var(--accent); color: var(--accent); }
  .add-section-card svg { width: 24px; height: 24px; }
  .add-section-card span { font-size: 14px; font-weight: 500; }

  /* ─── CALENDAR ──────────────────────────────── */
  .calendar-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .cal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .cal-month { font-size: 17px; font-weight: 600; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-btn {
    width: 34px; height: 34px;
    background: var(--bg-glass2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text); transition: all 0.2s;
  }
  .cal-btn:hover { background: var(--bg-glass2); border-color: var(--border2); }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 8px;
  }
  .cal-weekday {
    text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase; padding: 4px 0;
  }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    border: 1px solid transparent;
  }
  .cal-day.empty { pointer-events: none; }
  .cal-day.today { border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .cal-day.done { background: rgba(48,209,88,0.2); color: var(--green); }
  .cal-day.miss { background: rgba(255,69,58,0.2); color: var(--red); }
  .cal-day.future { color: var(--text-dim); cursor: default; pointer-events: none; }
  .cal-day:not(.future):not(.empty):hover { background: var(--bg-glass2); transform: scale(1.05); }
  .cal-day.done:hover { background: rgba(48,209,88,0.3); }
  .cal-day.miss:hover { background: rgba(255,69,58,0.3); }

  /* multi-section combined day */
  .cal-day .day-dots {
    position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px;
  }
  .cal-day .day-dot { width: 4px; height: 4px; border-radius: 50%; }

  /* ─── SECTION DETAIL PAGE ───────────────────── */
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none;
    color: var(--accent); font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 500; cursor: pointer;
    margin-bottom: 20px; padding: 0;
  }
  .back-btn svg { width: 18px; height: 18px; }

  .detail-hero {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .detail-hero::after {
    content: '';
    position: absolute; right: -20px; top: -20px;
    width: 120px; height: 120px; border-radius: 50%;
    background: var(--c); opacity: 0.08;
  }
  .detail-icon { font-size: 40px; margin-bottom: 10px; }
  .detail-name { font-size: 26px; font-weight: 700; }
  .detail-stats {
    display: flex; gap: 20px; margin-top: 16px;
    flex-wrap: wrap;
  }
  .stat-chip {
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ─── TODAY CHECK BUTTONS ───────────────────── */
  .check-row {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .check-btn {
    flex: 1; padding: 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: none;
    font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--text-sub);
  }
  .check-btn.done-btn:hover, .check-btn.done-btn.active {
    background: rgba(48,209,88,0.15);
    border-color: var(--green); color: var(--green);
  }
  .check-btn.miss-btn:hover, .check-btn.miss-btn.active {
    background: rgba(255,69,58,0.15);
    border-color: var(--red); color: var(--red);
  }
  .check-btn svg { width: 20px; height: 20px; }

  /* ─── NOTES ─────────────────────────────────── */
  .note-area {
    width: 100%; padding: 14px 16px;
    background: var(--bg-glass2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 15px; resize: none; outline: none;
    transition: border-color 0.2s; min-height: 80px;
  }
  .note-area:focus { border-color: var(--border2); }
  .note-save-btn {
    margin-top: 8px; padding: 10px 20px;
    background: var(--bg-glass2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-sub); font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .note-save-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ─── HEATMAP ────────────────────────────────── */
  .heatmap-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .heatmap-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text-sub); }
  .heatmap-grid {
    display: flex; gap: 3px; flex-wrap: nowrap;
  }
  .heatmap-week { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 12px; height: 12px; border-radius: 2px;
    background: var(--bg-glass2);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .heatmap-cell:hover { transform: scale(1.3); }
  .heatmap-cell.done { background: var(--c, var(--green)); opacity: 0.9; }
  .heatmap-cell.miss { background: var(--red); opacity: 0.5; }

  /* ─── COMBINED PAGE ─────────────────────────── */
  .combined-legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ─── MODAL ─────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 0 calc(var(--safe-bottom) + 20px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-card2);
    border: 1px solid var(--border2);
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 24px;
    width: 100%; max-width: 480px;
    transform: translateY(40px);
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border2);
    margin: -12px auto 20px;
  }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
  .modal-field input, .modal-field select {
    width: 100%; padding: 13px 15px;
    background: var(--bg-glass2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
  .modal-field select option { background: var(--bg-card2); }
  .emoji-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .emoji-opt {
    width: 42px; height: 42px;
    background: var(--bg-glass2); border: 2px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: all 0.15s;
  }
  .emoji-opt.selected { border-color: var(--accent); background: rgba(91,143,255,0.15); }
  .color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .color-opt {
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; border: 3px solid transparent;
    transition: all 0.15s;
  }
  .color-opt.selected { border-color: white; transform: scale(1.1); }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .modal-cancel {
    flex: 1; padding: 14px;
    background: var(--bg-glass2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-sub);
    font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .modal-cancel:hover { border-color: var(--border2); }
  .modal-confirm {
    flex: 2; padding: 14px;
    background: linear-gradient(135deg, #5b8fff, #a855f7);
    border: none; border-radius: var(--radius-sm);
    color: white; font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-confirm:hover { opacity: 0.9; }

  /* ─── PROFILE PAGE ──────────────────────────── */
  .profile-avatar-wrap {
    position: relative; width: 90px; margin: 0 auto 12px;
  }
  .profile-avatar-lg {
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(135deg, #5b8fff, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; color: white;
    overflow: hidden;
    border: 3px solid var(--border2);
  }
  .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-upload-btn {
    position: absolute; bottom: 0; right: 0;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg-base);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(91,143,255,0.5);
  }
  .avatar-upload-btn:hover { background: #7aa3ff; transform: scale(1.1); }
  .avatar-upload-btn svg { width: 14px; height: 14px; color: white; }

  /* ─── STATS PAGE ────────────────────────────── */
  .stats-row {

    gap: 12px; margin-bottom: 12px;

  /* ─── TOAST ─────────────────────────────────── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-card2); border: 1px solid var(--border2);
    border-radius: 40px; padding: 12px 20px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: all 0.3s ease;
    z-index: 500; white-space: nowrap;

  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── RESPONSIVE ────────────────────────────── */

  /* ─── ANIMATIONS ────────────────────────────── */

    to { opacity: 1; transform: translateY(0); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────
//  DATA LAYER
// ─────────────────────────────────────────────────────────
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k)
};

const DEFAULT_SECTIONS = [
  { id: 'study',    name: 'Study',    icon: '📚', color: '#4f8eff' },
  { id: 'gym',      name: 'Gym',      icon: '💪', color: '#ff6b35' },
  { id: 'work',     name: 'Work',     icon: '💼', color: '#a855f7' },
  { id: 'projects', name: 'Projects', icon: '🚀', color: '#06d6a0' },
];

const EMOJI_OPTS = ['📚','💪','💼','🚀','🎯','🎨','✍️','🎵','🧘','🏃','🍎','🌿','💡','🔬','🏋️','🎮','📝','🌅','💰','❤️','🧠','📖','🏅','⚡'];
const COLOR_OPTS = ['#4f8eff','#ff6b35','#a855f7','#06d6a0','#ff9f0a','#5ac8fa','#ff375f','#30d158','#bf5af2','#ffd60a','#64d2ff','#ff6961','#c8a2c8','#77dd77'];

let currentUser = null;
let currentSectionId = null;
let noteModalContext = { sectionId: null, dateStr: null };
let newSectionEmoji = '📚', newSectionColor = '#4f8eff';

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return dateStr(new Date()); }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }

function getUserData() { return DB.get(`caldy_data_${currentUser}`) || { sections: [...DEFAULT_SECTIONS], logs: {}, notes: {} }; }
function saveUserData(d) { DB.set(`caldy_data_${currentUser}`, d); }

function getLog(data, sectionId, dateStr) { return (data.logs[sectionId] || {})[dateStr] || null; }
function setLog(data, sectionId, dateStr, val) {
  if (!data.logs[sectionId]) data.logs[sectionId] = {};
  data.logs[sectionId][dateStr] = val;
}

function calcStreak(logs, sectionId) {
  const sectionLogs = logs[sectionId] || {};
  let streak = 0, d = new Date();
  while (true) {
    const s = dateStr(d);
    if (sectionLogs[s] === 'done') streak++;
    else if (sectionLogs[s] === 'miss') break;
    else if (s !== todayStr()) break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function calcGlobalStreak(data) {
  let streak = 0; const d = new Date();
  while (true) {
    const s = dateStr(d);
    const anyDone = data.sections.some(sec => getLog(data, sec.id, s) === 'done');
    if (anyDone) streak++;
    else if (s !== todayStr()) break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function calcTotal(logs, sectionId) {
  return Object.values(logs[sectionId] || {}).filter(v => v === 'done').length;
}

function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ─────────────────────────────────────────────────────────
//  AUTH
// ─────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('auth-err').textContent = '';
}

function authErr(msg) { document.getElementById('auth-err').textContent = msg; }

function login() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) return authErr('Please fill in all fields.');
  const users = DB.get('caldy_users') || {};
  if (!users[u]) return authErr('Account not found.');
  if (users[u].pass !== btoa(p)) return authErr('Wrong password.');
  startSession(u, users[u]);
}

function register() {
  const name = document.getElementById('reg-name').value.trim();
  const u = document.getElementById('reg-user').value.trim().toLowerCase();
  const email = document.getElementById('reg-email').value.trim();
  const p = document.getElementById('reg-pass').value;
  if (!name || !u || !email || !p) return authErr('Please fill in all fields.');
  if (p.length < 6) return authErr('Password must be at least 6 characters.');
  if (!/^[a-z0-9_]+$/.test(u)) return authErr('Username: letters, numbers, _ only.');
  const users = DB.get('caldy_users') || {};
  if (users[u]) return authErr('Username already taken.');
  users[u] = { name, email, pass: btoa(p) };
  DB.set('caldy_users', users);
  startSession(u, users[u]);
}

function startSession(username, userObj) {
  DB.set('caldy_session', username);
  currentUser = username;
  document.getElementById('topbar-name').textContent = userObj.name.split(' ')[0];
  updateTopbarAvatar();
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  setTimeout(() => renderHome(), 300);
}

function logout() {
  DB.del('caldy_session');
  currentUser = null;
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-err').textContent = '';
}

// ─────────────────────────────────────────────────────────
//  NAV
// ─────────────────────────────────────────────────────────
function navTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${page}`)?.classList.add('active');
  document.getElementById(`nav-${page}`)?.classList.add('active');
  if (page === 'home') renderHome();
  if (page === 'combined') renderCombined();
  if (page === 'stats') renderStats();
  if (page === 'profile') renderProfile();
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────────────────
//  HOME
// ─────────────────────────────────────────────────────────
function renderHome() {
  const data = getUserData();
  const now = new Date();
  const h = now.getHours();
  const greetings = ['🌙 Good night', '🌅 Good morning', '☀️ Good afternoon', '🌆 Good evening'];
  const gi = h < 5 ? 0 : h < 12 ? 1 : h < 17 ? 2 : 3;
  const users = DB.get('caldy_users') || {};
  const uName = users[currentUser]?.name || currentUser;
  document.getElementById('home-greeting').textContent = `${greetings[gi]}, ${uName.split(' ')[0]}`;
  document.getElementById('today-date-label').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('today-day-label').textContent = `${months[now.getMonth()]} ${now.getFullYear()}`;

  // streak
  document.getElementById('global-streak').innerHTML = `🔥 ${calcGlobalStreak(data)} day${calcGlobalStreak(data) !== 1 ? 's' : ''}`;

  // today progress
  const tp = document.getElementById('today-progress');
  tp.innerHTML = '';
  const today = todayStr();
  data.sections.forEach(sec => {
    const log = getLog(data, sec.id, today);
    const pct = log === 'done' ? 100 : log === 'miss' ? 0 : 50;
    const color = log === 'done' ? 'var(--green)' : log === 'miss' ? 'var(--red)' : 'var(--text-dim)';
    tp.innerHTML += `<div class="progress-bar-wrap">
      <span class="progress-label" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${sec.icon} ${sec.name}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="progress-pct" style="color:${color}">${log === 'done' ? '✓' : log === 'miss' ? '✗' : '–'}</span>
    </div>`;
  });

  // sections grid
  const grid = document.getElementById('sections-grid');
  grid.innerHTML = '';
  data.sections.forEach(sec => {
    const log = getLog(data, sec.id, today);
    const streak = calcStreak(data.logs, sec.id);
    const dotClass = log === 'done' ? 'done' : log === 'miss' ? 'skip' : 'none';
    const div = document.createElement('div');
    div.className = 'section-card fade-up';
    div.style.setProperty('--c', sec.color);
    div.innerHTML = `
      <div class="card-today ${dotClass}"></div>
      <div class="card-icon">${sec.icon}</div>
      <div class="card-name">${sec.name}</div>
      <div class="card-streak">🔥 <span>${streak}</span> day streak</div>
    `;
    div.onclick = () => openSection(sec.id);
    grid.appendChild(div);
  });

  // add section card
  const addCard = document.createElement('div');
  addCard.className = 'add-section-card';
  addCard.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>Add Section</span>`;
  addCard.onclick = openAddModal;
  grid.appendChild(addCard);
}

// ─────────────────────────────────────────────────────────
//  SECTION DETAIL
// ─────────────────────────────────────────────────────────
function openSection(id) {
  currentSectionId = id;
  const data = getUserData();
  const sec = data.sections.find(s => s.id === id);
  if (!sec) return;

  const today = todayStr();
  const log = getLog(data, id, today);
  const streak = calcStreak(data.logs, id);
  const total = calcTotal(data.logs, id);

  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="detail-hero" style="--c:${sec.color}">
      <div class="detail-icon">${sec.icon}</div>
      <div class="detail-name">${sec.name}</div>
      <div class="detail-stats">
        <div class="stat-chip"><div class="stat-val" style="color:${sec.color}">${streak}</div><div class="stat-lbl">🔥 Streak</div></div>
        <div class="stat-chip"><div class="stat-val">${total}</div><div class="stat-lbl">Total Done</div></div>
        <div class="stat-chip"><div class="stat-val">${calcRate(data.logs, id)}%</div><div class="stat-lbl">30d Rate</div></div>
      </div>
    </div>

    <div class="check-row">
      <button class="check-btn done-btn ${log==='done'?'active':''}" id="btn-done" onclick="logDay('${id}','done')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Done
      </button>
      <button class="check-btn miss-btn ${log==='miss'?'active':''}" id="btn-miss" onclick="logDay('${id}','miss')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Missed
      </button>
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:13px;color:var(--text-sub);font-weight:600;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px;">Today's Note</div>
      <textarea class="note-area" id="detail-note" placeholder="Add a note for today…" rows="3">${(data.notes[id] || {})[today] || ''}</textarea>
      <button class="note-save-btn" onclick="saveNote('${id}','${today}')">Save Note</button>
    </div>
  `;

  // Calendar
  content.innerHTML += `<div id="detail-calendar"></div>`;
  // Heatmap
  content.innerHTML += `<div id="detail-heatmap"></div>`;

  // Delete section option (not for defaults)
  const isDefault = DEFAULT_SECTIONS.some(d => d.id === id);
  if (!isDefault) {
    content.innerHTML += `<button onclick="deleteSection('${id}')" style="width:100%;padding:14px;background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.2);border-radius:var(--radius);color:var(--red);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;">Delete Section</button>`;
  }

  renderDetailCalendar(sec, data);
  renderHeatmap(sec, data);

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  window.scrollTo(0, 0);
}

function calcRate(logs, sectionId) {
  let done = 0;
  const sLogs = logs[sectionId] || {};
  const d = new Date();
  for (let i = 0; i < 30; i++) {
    if (sLogs[dateStr(d)] === 'done') done++;
    d.setDate(d.getDate() - 1);
  }
  return Math.round((done / 30) * 100);
}

function logDay(sectionId, val) {
  const data = getUserData();
  const today = todayStr();
  const existing = getLog(data, sectionId, today);
  // toggle off if same
  setLog(data, sectionId, today, existing === val ? null : val);
  saveUserData(data);
  openSection(sectionId);
  toast(val === 'done' ? '✅ Marked as done!' : '❌ Marked as missed');
}

function saveNote(sectionId, date) {
  const data = getUserData();
  if (!data.notes[sectionId]) data.notes[sectionId] = {};
  const val = document.getElementById('detail-note')?.value || '';
  data.notes[sectionId][date] = val;
  saveUserData(data);
  toast('📝 Note saved!');
}

function saveNoteFromModal() {
  const { sectionId, dateStr: ds } = noteModalContext;
  const val = document.getElementById('note-modal-input').value;
  const data = getUserData();
  if (!data.notes[sectionId]) data.notes[sectionId] = {};
  data.notes[sectionId][ds] = val;
  saveUserData(data);
  closeModal('note-modal');
  toast('📝 Note saved!');
}

function deleteSection(id) {
  if (!confirm('Delete this section and all its data?')) return;
  const data = getUserData();
  data.sections = data.sections.filter(s => s.id !== id);
  delete data.logs[id];
  delete data.notes[id];
  saveUserData(data);
  navTo('home');
  toast('🗑️ Section deleted');
}

// ─────────────────────────────────────────────────────────
//  CALENDAR RENDER
// ─────────────────────────────────────────────────────────
let calViewDate = new Date();

function renderDetailCalendar(sec, data, container = 'detail-calendar', viewDate = null) {
  const vd = viewDate || new Date();
  const wrap = document.getElementById(container);
  if (!wrap) return;

  const year = vd.getFullYear(), month = vd.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today = todayStr();

  wrap.innerHTML = `
    <div class="calendar-wrap">
      <div class="cal-header">
        <div class="cal-month">${monthNames[month]} ${year}</div>
        <div class="cal-nav">
          <div class="cal-btn" onclick="shiftDetailCal(-1,'${sec.id}','${container}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </div>
          <div class="cal-btn" onclick="shiftDetailCal(1,'${sec.id}','${container}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </div>
      <div class="cal-weekdays">
        ${['S','M','T','W','T','F','S'].map(d => `<div class="cal-weekday">${d}</div>`).join('')}
      </div>
      <div class="cal-days" id="${container}-days"></div>
    </div>
  `;

  const daysEl = document.getElementById(`${container}-days`);
  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div'); e.className = 'cal-day empty'; daysEl.appendChild(e);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const log = getLog(data, sec.id, ds);
    const isToday = ds === today;
    const isFuture = ds > today;
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (log === 'done' ? ' done' : log === 'miss' ? ' miss' : '') + (isToday ? ' today' : '') + (isFuture ? ' future' : '');
    cell.textContent = d;
    if (!isFuture) {
      cell.onclick = () => openDayNote(sec.id, ds);
    }
    daysEl.appendChild(cell);
  }
}

const calViewDates = {};
function shiftDetailCal(dir, secId, container) {
  if (!calViewDates[container]) calViewDates[container] = new Date();
  calViewDates[container].setMonth(calViewDates[container].getMonth() + dir);
  const data = getUserData();
  const sec = data.sections.find(s => s.id === secId);
  renderDetailCalendar(sec, data, container, calViewDates[container]);
}

function openDayNote(sectionId, ds) {
  const data = getUserData();
  const note = (data.notes[sectionId] || {})[ds] || '';
  noteModalContext = { sectionId, dateStr: ds };
  const d = parseDate(ds);
  document.getElementById('note-modal-title').textContent = `Note — ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
  document.getElementById('note-modal-input').value = note;
  openModal('note-modal');
}

// ─────────────────────────────────────────────────────────
//  HEATMAP
// ─────────────────────────────────────────────────────────
function renderHeatmap(sec, data) {
  const wrap = document.getElementById('detail-heatmap');
  if (!wrap) return;
  const weeks = 26;
  const today = new Date();
  const start = new Date(today);
  start.setDate(start.getDate() - weeks * 7 + 1);

  let html = `<div class="heatmap-wrap"><div class="heatmap-title">Last 6 months</div><div class="heatmap-grid" id="heatmap-inner"></div></div>`;
  wrap.innerHTML = html;

  const inner = document.getElementById('heatmap-inner');
  let d = new Date(start);
  // Align to Sunday
  while (d.getDay() !== 0) d.setDate(d.getDate() - 1);

  for (let w = 0; w < weeks; w++) {
    const weekEl = document.createElement('div');
    weekEl.className = 'heatmap-week';
    for (let day = 0; day < 7; day++) {
      const ds = dateStr(d);
      const log = getLog(data, sec.id, ds);
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell' + (log === 'done' ? ' done' : log === 'miss' ? ' miss' : '');
      cell.style.setProperty('--c', sec.color);
      cell.title = `${ds}: ${log || 'no log'}`;
      cell.onclick = () => openDayNote(sec.id, ds);
      weekEl.appendChild(cell);
      d.setDate(d.getDate() + 1);
    }
    inner.appendChild(weekEl);
  }
}

// ─────────────────────────────────────────────────────────
//  COMBINED CALENDAR
// ─────────────────────────────────────────────────────────
let combinedViewDate = new Date();

function renderCombined() {
  const data = getUserData();
  const legend = document.getElementById('combined-legend');
  legend.innerHTML = '';
  data.sections.forEach(sec => {
    legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${sec.color}"></div>${sec.icon} ${sec.name}</div>`;
  });

  renderCombinedCalendar(data, combinedViewDate);
}

function renderCombinedCalendar(data, vd) {
  const wrap = document.getElementById('combined-calendar');
  const year = vd.getFullYear(), month = vd.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today = todayStr();

  wrap.innerHTML = `
    <div class="calendar-wrap">
      <div class="cal-header">
        <div class="cal-month">${monthNames[month]} ${year}</div>
        <div class="cal-nav">
          <div class="cal-btn" onclick="shiftCombinedCal(-1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </div>
          <div class="cal-btn" onclick="shiftCombinedCal(1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </div>
      <div class="cal-weekdays">
        ${['S','M','T','W','T','F','S'].map(d => `<div class="cal-weekday">${d}</div>`).join('')}
      </div>
      <div class="cal-days" id="combined-days"></div>
    </div>
  `;

  const daysEl = document.getElementById('combined-days');
  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div'); e.className = 'cal-day empty'; daysEl.appendChild(e);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === today;
    const isFuture = ds > today;
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isToday ? ' today' : '') + (isFuture ? ' future' : '');
    cell.textContent = d;

    // dots for each section
    const dotsEl = document.createElement('div');
    dotsEl.className = 'day-dots';

    let allDone = true, anyLogged = false;
    data.sections.forEach(sec => {
      const log = getLog(data, sec.id, ds);
      if (log) anyLogged = true;
      if (log !== 'done') allDone = false;
      if (log === 'done' || log === 'miss') {
        const dot = document.createElement('div');
        dot.className = 'day-dot';
        dot.style.background = log === 'done' ? sec.color : 'var(--red)';
        dotsEl.appendChild(dot);
      }
    });

    if (!isFuture && anyLogged) {
      if (allDone) cell.style.background = 'rgba(48,209,88,0.12)';
      cell.appendChild(dotsEl);
    }

    daysEl.appendChild(cell);
  }
}

function shiftCombinedCal(dir) {
  combinedViewDate.setMonth(combinedViewDate.getMonth() + dir);
  const data = getUserData();
  renderCombinedCalendar(data, combinedViewDate);
}

// ─────────────────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────────────────
function renderStats() {
  const data = getUserData();
  const content = document.getElementById('stats-content');
  let totalDone = 0, totalMiss = 0;
  data.sections.forEach(sec => {
    const logs = data.logs[sec.id] || {};
    Object.values(logs).forEach(v => { if (v === 'done') totalDone++; if (v === 'miss') totalMiss++; });
  });
  const rate = totalDone + totalMiss > 0 ? Math.round((totalDone / (totalDone + totalMiss)) * 100) : 0;
  const gStreak = calcGlobalStreak(data);

  content.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-val" style="color:var(--green)">${totalDone}</div><div class="stat-card-lbl">Total Done</div></div>
      <div class="stat-card"><div class="stat-card-val" style="color:var(--red)">${totalMiss}</div><div class="stat-card-lbl">Total Missed</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-val" style="color:var(--yellow)">${gStreak}</div><div class="stat-card-lbl">🔥 Global Streak</div></div>
      <div class="stat-card"><div class="stat-card-val" style="color:var(--accent)">${rate}%</div><div class="stat-card-lbl">Commit Rate</div></div>
    </div>
    <div style="font-size:13px;color:var(--text-sub);font-weight:600;text-transform:uppercase;letter-spacing:0.7px;margin:20px 0 12px;">Per Section</div>
  `;

  data.sections.forEach(sec => {
    const streak = calcStreak(data.logs, sec.id);
    const total = calcTotal(data.logs, sec.id);
    const rate30 = calcRate(data.logs, sec.id);
    content.innerHTML += `
      <div class="settings-group" style="margin-bottom:10px;" onclick="openSection('${sec.id}')">
        <div class="settings-row">
          <span class="settings-row-icon">${sec.icon}</span>
          <span class="settings-row-label">${sec.name}</span>
          <span style="font-size:12px;color:${sec.color};font-weight:600;margin-right:10px;">${rate30}% / 30d</span>
          <span style="font-size:12px;color:var(--yellow);">🔥${streak}</span>
        </div>
      </div>
    `;
  });
}

// ─────────────────────────────────────────────────────────
//  PROFILE
// ─────────────────────────────────────────────────────────
function renderProfile() {
  const users = DB.get('caldy_users') || {};
  const u = users[currentUser] || {};
  const photo = DB.get(`caldy_photo_${currentUser}`);
  const content = document.getElementById('profile-content');

  const avatarInner = photo
    ? `<img src="${photo}" alt="Profile photo">`
    : `${(u.name||'U')[0].toUpperCase()}`;

  const removeBtn = photo
    ? `<div class="settings-row" onclick="removeProfilePhoto()" style="color:var(--red)">
        <span class="settings-row-icon">🗑️</span>
        <span class="settings-row-label" style="color:var(--red)">Remove Photo</span>
        <span class="settings-chevron">›</span>
       </div>`
    : '';

  content.innerHTML = `
    <div class="profile-avatar-wrap">
      <div class="profile-avatar-lg" id="profile-avatar-lg">${avatarInner}</div>
      <div class="avatar-upload-btn" onclick="triggerPhotoUpload()" title="Change photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
    </div>
    <div class="profile-name">${u.name || currentUser}</div>
    <div class="profile-email">${u.email || ''}</div>
    <div style="text-align:center;margin-bottom:28px;">
      <button onclick="triggerPhotoUpload()" style="background:none;border:none;color:var(--accent);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;padding:4px 0;">
        ${photo ? '✏️ Change photo' : '📷 Add profile photo'}
      </button>
    </div>
    <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)">
    <div class="settings-group">
      <div class="settings-row">
        <span class="settings-row-icon">👤</span>
        <span class="settings-row-label">Username</span>
        <span class="settings-row-value">@${currentUser}</span>
      </div>
      <div class="settings-row">
        <span class="settings-row-icon">📧</span>
        <span class="settings-row-label">Email</span>
        <span class="settings-row-value">${u.email || '—'}</span>
      </div>
    </div>

      <div class="settings-row" onclick="exportData()">

      </div>
      <div class="settings-row" onclick="importData()">

}

function triggerPhotoUpload() {
  document.getElementById('photo-input')?.click();
}

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('⚠️ Please select an image file'); return; }
  if (file.size > 5 * 1024 * 1024) { toast('⚠️ Image must be under 5MB'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    // Compress/resize to 200x200 via canvas
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 200; canvas.height = 200;
      const ctx = canvas.getContext('2d');
      // Crop to square from center
      const size = Math.min(img.width, img.height);
      const sx = (img.width - size) / 2;
      const sy = (img.height - size) / 2;
      ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      DB.set(`caldy_photo_${currentUser}`, dataUrl);
      updateTopbarAvatar();
      renderProfile();
      toast('🎉 Profile photo updated!');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeProfilePhoto() {
  DB.del(`caldy_photo_${currentUser}`);
  updateTopbarAvatar();
  renderProfile();
  toast('🗑️ Photo removed');
}

function updateTopbarAvatar() {
  const users = DB.get('caldy_users') || {};
  const u = users[currentUser] || {};
  const photo = DB.get(`caldy_photo_${currentUser}`);
  const avatarEl = document.getElementById('topbar-avatar');
  if (!avatarEl) return;
  if (photo) {
    avatarEl.innerHTML = `<img src="${photo}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    avatarEl.innerHTML = (u.name || currentUser)[0].toUpperCase();
  }
}

function exportData() {
  const data = getUserData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `caldy-backup-${currentUser}-${todayStr()}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('📤 Data exported!');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        saveUserData(data);
        toast('📥 Data imported!');
        renderHome();
      } catch { toast('❌ Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─────────────────────────────────────────────────────────
//  ADD SECTION MODAL
// ─────────────────────────────────────────────────────────
function openAddModal() {
  newSectionEmoji = EMOJI_OPTS[0];
  newSectionColor = COLOR_OPTS[0];
  document.getElementById('new-section-name').value = '';

  const eg = document.getElementById('emoji-grid');
  eg.innerHTML = '';
  EMOJI_OPTS.forEach(e => {
    const div = document.createElement('div');
    div.className = 'emoji-opt' + (e === newSectionEmoji ? ' selected' : '');
    div.textContent = e;
    div.onclick = () => { newSectionEmoji = e; document.querySelectorAll('.emoji-opt').forEach(el => el.classList.remove('selected')); div.classList.add('selected'); };
    eg.appendChild(div);
  });

  const cg = document.getElementById('color-grid');
  cg.innerHTML = '';
  COLOR_OPTS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'color-opt' + (c === newSectionColor ? ' selected' : '');
    div.style.background = c;
    div.onclick = () => { newSectionColor = c; document.querySelectorAll('.color-opt').forEach(el => el.classList.remove('selected')); div.classList.add('selected'); };
    cg.appendChild(div);
  });

  openModal('add-modal');
}

function addSection() {
  const name = document.getElementById('new-section-name').value.trim();
  if (!name) { toast('⚠️ Please enter a name'); return; }
  const data = getUserData();
  const id = 'custom_' + Date.now();
  data.sections.push({ id, name, icon: newSectionEmoji, color: newSectionColor });
  saveUserData(data);
  closeModal('add-modal');
  renderHome();
  toast(`✨ "${name}" section created!`);
}

// ─────────────────────────────────────────────────────────
//  MODAL HELPERS
// ─────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// ─────────────────────────────────────────────────────────
//  KEYBOARD SUPPORT
// ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-form').style.display !== 'none') login();
    if (document.getElementById('register-form').style.display !== 'none') register();
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
(function init() {
  const session = DB.get('caldy_session');
  if (session) {
    const users = DB.get('caldy_users') || {};
    if (users[session]) {
      startSession(session, users[session]);
    }
  }
})();
</script>
